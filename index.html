<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Panini 2026">
<meta name="theme-color" content="#080c14">
<title>⚽ Panini FIFA 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080c14;--surface:#0f1520;--card:#161e2e;--border:#1e2d44;--accent:#f5c518;--accent2:#e8452c;--green:#22c55e;--purple:#a78bfa;--text:#eef2ff;--muted:#607090;--r:10px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overscroll-behavior:none}
#app{min-height:100vh;display:flex;flex-direction:column}

/* HEADER */
.header{background:linear-gradient(160deg,#080c14,#0d1a35 40%,#140818);border-bottom:2px solid var(--accent);padding:13px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:9px}
.logo-title{font-family:'Bebas Neue',sans-serif;font-size:1.65rem;letter-spacing:3px;color:var(--accent);line-height:1;text-shadow:0 0 18px rgba(245,197,24,.35)}
.logo-sub{font-size:.6rem;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px}
.hstats{display:flex;gap:6px;flex-wrap:wrap}
.sp{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:999px;padding:4px 11px;font-size:.7rem;display:flex;align-items:center;gap:5px}
.sp strong{font-size:.88rem}

/* PROGRESS */
.prog{background:var(--surface);padding:8px 16px;border-bottom:1px solid var(--border)}
.ptop{display:flex;justify-content:space-between;font-size:.65rem;color:var(--muted);margin-bottom:4px}
.ptop span:last-child{color:var(--accent);font-weight:700}
.ptrack{height:5px;background:var(--border);border-radius:99px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:99px;transition:width .5s;box-shadow:0 0 8px rgba(245,197,24,.4)}

/* TOOLBAR */
.toolbar{padding:9px 16px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:58px;z-index:90}
.si{flex:1;min-width:150px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:8px 11px;color:var(--text);font-family:inherit;font-size:.8rem;outline:none;transition:border-color .2s}
.si::placeholder{color:var(--muted)}
.si:focus{border-color:var(--accent)}
.filters{display:flex;gap:5px;flex-wrap:wrap}
.fb{padding:6px 11px;border-radius:var(--r);border:1px solid var(--border);background:var(--card);color:var(--muted);font-family:inherit;font-size:.7rem;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.fb:hover{background:var(--border);color:var(--text)}
.fb.on{background:var(--accent);color:#000;border-color:var(--accent)}

/* MAIN */
.main{flex:1;padding:16px;max-width:1300px;margin:0 auto;width:100%}
.ts{margin-bottom:22px}
.th{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.tn{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:2px}
.tc .tn{color:var(--green)}
.tp{display:flex;align-items:center;gap:6px;font-size:.65rem;color:var(--muted)}
.mb{width:60px;height:3px;background:var(--border);border-radius:99px;overflow:hidden}
.mbf{height:100%;background:var(--accent);border-radius:99px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:5px}

/* STICKER */
.s{border-radius:7px;border:1.5px solid var(--border);background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform .1s,border-color .1s,box-shadow .1s;position:relative;overflow:hidden;user-select:none;padding:5px 2px 4px;gap:1px;min-height:68px;-webkit-user-select:none}
.s:active{transform:scale(.96)}
.s.foil{background:linear-gradient(135deg,#1a1a2e,#0e1628);border-color:#8855ff55}
.s.owned{background:linear-gradient(135deg,#0f2a18,#112212);border-color:var(--green);box-shadow:0 0 5px rgba(34,197,94,.2)}
.s.repeated{background:linear-gradient(135deg,#2a0f10,#2e1212);border-color:var(--accent2);box-shadow:0 0 5px rgba(232,69,44,.2)}
.sc{font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:.5px;color:var(--muted);line-height:1}
.s.owned .sc,.s.repeated .sc{color:var(--text)}
.s.foil .sc{color:#c4a0ff}
.sn{font-size:.4rem;color:var(--muted);text-align:center;padding:0 2px;line-height:1.25;max-width:100%}
.s.owned .sn{color:#86efac}
.s.repeated .sn{color:#fca5a5}
.s.foil .sn{color:#c4a0ff}
.bdg{position:absolute;top:2px;right:2px;width:13px;height:13px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.42rem;font-weight:700}
.bok{background:var(--green);color:#000}
.brep{background:var(--accent2);color:#fff}
.fd{position:absolute;top:2px;left:2px;font-size:.45rem}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:200;padding:14px}
.modal{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:24px;width:100%;max-width:300px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.7)}
.mc{font-family:'Bebas Neue',sans-serif;font-size:2.7rem;line-height:1}
.mc.foil{background:linear-gradient(135deg,#a78bfa,#e879f9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.mc.normal{color:var(--accent);text-shadow:0 0 20px rgba(245,197,24,.3)}
.mt{font-size:.65rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin:2px 0 3px}
.mp{font-size:.9rem;font-weight:600;margin-bottom:13px}
.sb{font-size:.75rem;padding:8px 10px;border-radius:8px;background:var(--surface);margin-bottom:13px}
.sb.ok{color:var(--green);border:1px solid var(--green)}
.sb.rep{color:var(--accent2);border:1px solid var(--accent2)}
.sb.miss{color:var(--muted);border:1px solid var(--border)}
.mbtns{display:flex;flex-direction:column;gap:7px}
.btn{padding:11px;border-radius:10px;border:none;font-family:inherit;font-size:.8rem;font-weight:700;cursor:pointer;transition:filter .15s;width:100%}
.btn:active{filter:brightness(.9)}
.bg{background:var(--green);color:#000}
.br{background:var(--accent2);color:#fff}
.bh{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--muted)}

/* SAVE TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:#22c55e;color:#000;font-weight:700;font-size:.78rem;padding:10px 20px;border-radius:999px;z-index:300;transition:transform .3s ease,opacity .3s;opacity:0;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

.empty{text-align:center;padding:48px;color:var(--muted)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>

// ─── PARSE ─────────────────────────────────────────────────────────────────
const ALL = RAW.trim().split('\n').map(l => {
  const p = l.split('|');
  return { id: p[0], label: p[1], team: p[2], foil: p[3] === 'F' };
});
const TOTAL = ALL.length;
const TEAMS = (() => {
  const seen = new Set(), list = [];
  ALL.forEach(s => { if (!seen.has(s.team)) { seen.add(s.team); list.push(s.team); } });
  return list;
})();

// ─── STATE (localStorage) ──────────────────────────────────────────────────
const SAVE_KEY = 'panini2026';
let owned = {};
try { owned = JSON.parse(localStorage.getItem(SAVE_KEY) || '{}'); } catch(e) {}

function save() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(owned)); } catch(e) {}
}

function getC(id) { return owned[id] || 0; }

let filterMode = 'all';
let searchQ = '';
let selSticker = null;

// ─── RENDER ────────────────────────────────────────────────────────────────
function render() {
  const ownedCount = Object.values(owned).filter(v => v >= 1).length;
  const repCount = Object.values(owned).filter(v => v >= 2).length;
  const pct = TOTAL > 0 ? Math.round(ownedCount / TOTAL * 100) : 0;

  const groups = TEAMS.map(team => {
    let st = ALL.filter(s => s.team === team);
    if (searchQ) {
      const q = searchQ.toLowerCase();
      st = st.filter(s => s.id.toLowerCase().includes(q) || s.label.toLowerCase().includes(q) || s.team.toLowerCase().includes(q));
    }
    if (filterMode === 'missing') st = st.filter(s => getC(s.id) === 0);
    if (filterMode === 'owned') st = st.filter(s => getC(s.id) >= 1);
    if (filterMode === 'repeated') st = st.filter(s => getC(s.id) >= 2);
    return { team, stickers: st };
  }).filter(g => g.stickers.length > 0);

  const tOwned = team => ALL.filter(s => s.team === team && getC(s.id) >= 1).length;
  const tTotal = team => ALL.filter(s => s.team === team).length;

  const stickerHTML = (s) => {
    const c = getC(s.id);
    const cls = [
      's',
      s.foil ? 'foil' : '',
      c >= 2 ? 'repeated' : c === 1 ? 'owned' : ''
    ].filter(Boolean).join(' ');
    return `<div class="${cls}" data-id="${s.id}" title="${s.id} · ${s.label}">
      ${s.foil ? '<span class="fd">✨</span>' : ''}
      <span class="sc">${s.id}</span>
      <span class="sn">${s.label}</span>
      ${c >= 2 ? `<span class="bdg brep">×${c}</span>` : c === 1 ? '<span class="bdg bok">✓</span>' : ''}
    </div>`;
  };

  const groupsHTML = groups.map(({ team, stickers }) => {
    const to = tOwned(team), tt = tTotal(team);
    const complete = to === tt && tt > 0;
    return `<div class="ts${complete ? ' tc' : ''}">
      <div class="th">
        <span class="tn">${complete ? '✅ ' : ''}${team}</span>
        <div class="tp">
          <span>${to}/${tt}</span>
          <div class="mb"><div class="mbf" style="width:${(to/tt*100).toFixed(0)}%"></div></div>
        </div>
      </div>
      <div class="grid">${stickers.map(stickerHTML).join('')}</div>
    </div>`;
  }).join('');

  const filters = [['all','Todas'],['missing','Faltan'],['owned','Tengo'],['repeated','Repetidas']];

  document.getElementById('app').innerHTML = `
    <header class="header">
      <div class="logo">
        <span style="font-size:1.4rem">⚽</span>
        <div>
          <div class="logo-title">PANINI FIFA 2026</div>
          <div class="logo-sub">World Cup · ${TOTAL} figuritas</div>
        </div>
      </div>
      <div class="hstats">
        <div class="sp">Tengo <strong style="color:var(--green)">${ownedCount}</strong>/${TOTAL}</div>
        <div class="sp">Rep. <strong style="color:var(--accent2)">${repCount}</strong></div>
        <div class="sp">Faltan <strong style="color:var(--purple)">${TOTAL - ownedCount}</strong></div>
      </div>
    </header>
    <div class="prog">
      <div class="ptop"><span>Progreso del álbum</span><span>${pct}% completado</span></div>
      <div class="ptrack"><div class="pfill" style="width:${pct}%"></div></div>
    </div>
    <div class="toolbar">
      <input class="si" id="searchInput" placeholder="🔍 Buscar código, jugador o equipo..." value="${searchQ}">
      <div class="filters">
        ${filters.map(([k,l]) => `<button class="fb${filterMode===k?' on':''}" data-filter="${k}">${l}</button>`).join('')}
      </div>
    </div>
    <main class="main" id="mainContent">
      ${groups.length === 0 ? '<div class="empty"><div style="font-size:2rem;margin-bottom:10px">🔎</div>Sin figuritas con ese filtro.</div>' : groupsHTML}
    </main>
    <div class="toast" id="toast">💾 Guardado</div>
    ${selSticker ? renderModal() : ''}
  `;

  attachEvents();
}

function renderModal() {
  const s = selSticker;
  const c = getC(s.id);
  const isOwned = c >= 1, isRep = c >= 2;
  const statusCls = isRep ? 'rep' : isOwned ? 'ok' : 'miss';
  const statusMsg = isRep
    ? `🔁 Tienes ${c} copias · ${c-1} repetida${c-1>1?'s':''}`
    : isOwned ? '✅ Pegada en el álbum' : '❌ Aún no la tienes';
  return `<div class="overlay" id="overlay">
    <div class="modal">
      <div class="mc ${s.foil?'foil':'normal'}">${s.id}</div>
      <div class="mt">${s.team}${s.foil?' · ✨ FOIL':''}</div>
      <div class="mp">${s.label}</div>
      <div class="sb ${statusCls}">${statusMsg}</div>
      <div class="mbtns">
        ${!isOwned ? '<button class="btn bg" id="btnOwn">✅  La tengo — pegar en álbum</button>' : ''}
        ${isOwned ? '<button class="btn br" id="btnAdd">🔁  Tengo una repetida más</button>' : ''}
        ${isOwned ? '<button class="btn bh" id="btnRem">↩  Quitar una copia</button>' : ''}
        <button class="btn bh" id="btnClose">Cerrar</button>
      </div>
    </div>
  </div>`;
}

function showToast() {
  const t = document.getElementById('toast');
  if (!t) return;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function attachEvents() {
  // Search
  const si = document.getElementById('searchInput');
  if (si) si.addEventListener('input', e => { searchQ = e.target.value; render(); });

  // Filters
  document.querySelectorAll('.fb').forEach(btn => {
    btn.addEventListener('click', () => { filterMode = btn.dataset.filter; render(); });
  });

  // Stickers
  document.querySelectorAll('.s').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.id;
      selSticker = ALL.find(s => s.id === id);
      render();
    });
  });

  // Modal buttons
  const btnOwn = document.getElementById('btnOwn');
  const btnAdd = document.getElementById('btnAdd');
  const btnRem = document.getElementById('btnRem');
  const btnClose = document.getElementById('btnClose');
  const overlay = document.getElementById('overlay');

  if (btnOwn) btnOwn.addEventListener('click', () => { owned[selSticker.id] = 1; save(); showToast(); selSticker = null; render(); });
  if (btnAdd) btnAdd.addEventListener('click', () => { owned[selSticker.id] = (owned[selSticker.id] || 0) + 1; save(); showToast(); selSticker = null; render(); });
  if (btnRem) btnRem.addEventListener('click', () => {
    const c = (owned[selSticker.id] || 0) - 1;
    if (c <= 0) delete owned[selSticker.id]; else owned[selSticker.id] = c;
    save(); showToast(); selSticker = null; render();
  });
  if (btnClose) btnClose.addEventListener('click', () => { selSticker = null; render(); });
  if (overlay) overlay.addEventListener('click', e => { if (e.target === overlay) { selSticker = null; render(); } });
}

render();
</script>
